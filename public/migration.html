<!DOCTYPE html>
<html>
<head>
    <title>Oribos Exchange Migration</title>
    <style>
        body {background-color: black; color: #ccc; font-family: sans-serif}
        div {text-align: center}
    </style>
    <script>
        (function () {
            if (location.host !== 'oribos.exchange' || window.parent === window) {
                location.href = 'https://oribos.exchange/';

                return;
            }

            let data = {};
            for (let index = localStorage.length - 1; index >= 0; index--) {
                let key = localStorage.key(index);
                data[key] = localStorage.getItem(key);
            }

            if (Object.values(data).length) {
                window.parent.postMessage(
                    {
                        action: 'migration',
                        storage: data,
                    },
                    'https://undermine.exchange',
                );
            }
        })();
    </script>
</head>
<body><div>This hidden frame helps to copy Oribos Exchange preferences to Undermine Exchange.</div></body>
