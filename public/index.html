<!DOCTYPE html>
<html>
<head>
    <title>Oribos Exchange</title>
    <!--
        For my mother.
    -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="45x45" href="images/favicon/native.png" type="image/png">
    <link rel="icon" href="images/favicon/favicon.ico">
    <meta name="viewport" content="width=device-width">
    <script>
        const wowhead_tooltips = {hide: {extra: true}};
    </script>
    <script src="power.js" async></script>
</head>
<body>
<div class="main">
    <div class="search-bar">
        <select>
            <option value="">Choose a realm:</option>
        </select>
        <div class="small-button favorite" data-default-tooltip="Mark items as favorites by clicking the star on their search result rows, and this button will search only those favorites."></div>
        <div class="small-button deals" data-simple-tooltip="Deals Search"></div>
        <div class="text-container">
            <input type="text" placeholder="Search">
            <div class="text-reset"></div>
            <div class="datalist"></div>
        </div>
        <div class="filter">Filter<div>
            <span class="q">Level Range</span><br>
            <input type="number" name="level-min" maxlength="3" min="0" max="999">-<input type="number" name="level-max" maxlength="3" min="0" max="999"><br>
            <br>
            <span class="q">Rarity</span><br>
            <table class="rarity">
                <tr><td>From</td>
                    <td><select class="rarity q0" name="rarity-from">
                    <option value="0" class="q0" SELECTED>Poor</option>
                    <option value="1" class="q1">Common</option>
                    <option value="2" class="q2">Uncommon</option>
                    <option value="3" class="q3">Rare</option>
                    <option value="4" class="q4">Epic</option>
                    <option value="5" class="q5">Legendary</option>
                </select></td></tr>
                <tr><td>To</td>
                <td><select class="rarity q5" name="rarity-to">
                    <option value="0" class="q0">Poor</option>
                    <option value="1" class="q1">Common</option>
                    <option value="2" class="q2">Uncommon</option>
                    <option value="3" class="q3">Rare</option>
                    <option value="4" class="q4">Epic</option>
                    <option value="5" class="q5" SELECTED>Legendary</option>
                </select></td></tr>
            </table>
            <br>
            <span class="q">Era</span><br>
            <select class="expansion" name="expansion">
                <option value="" SELECTED>All</option>
                <option value="10">Dragonflight</option>
                <option value="9">Shadowlands</option>
                <option value="8">Battle for Azeroth</option>
                <option value="7">Legion</option>
                <option value="6">Warlords of Draenor</option>
                <option value="5">Mists of Pandaria</option>
                <option value="4">Cataclysm</option>
                <option value="3">Wrath of the Lich King</option>
                <option value="2">The Burning Crusade</option>
                <option value="1">Vanilla</option>
            </select><br>
            <br>
            <label data-simple-tooltip="Mixes item levels, item suffixes, and battle pet breeds in search results."><input type="checkbox" name="transmog-mode"> Ignore Varieties</label><br>
            <label data-simple-tooltip="Only shows results which have posted prices under the vendor sell price."><input type="checkbox" name="vendor-flip"> Only Below Vendor Price</label><br>
            <label data-simple-tooltip="Includes results which currently have no quantity available (but have previously been posted)."><input type="checkbox" name="out-of-stock" CHECKED> Include Out-of-Stock</label><br>
        </div></div>
        <button class="search">Search</button>
    </div>
    <div class="main-result">
        <div class="categories-parent">
            <div class="categories"></div>
        </div>
        <div class="search-result">
            <div class="welcome">
                <h1>Oribos Exchange</h1>
                <div>
                    An augmented Auction House interface, used by the Brokers of Oribos.
                </div>

                <div class="full-screen">Mobile browsers should work better in full-screen mode.<br><br>
                    <button>Use Full Screen</button>
                </div>

                <div>Created by Erorus for players of <a href="https://worldofwarcraft.com/">World of Warcraft: Dragonflight</a>.<br><br>
                    <a href="https://www.patreon.com/erorus"><img src="https://everynothing.net/patronButton.png" alt="Become a Patron!" style="vertical-align:middle;" width="154" height="31" border="0"></a></div>
            </div>
            <div class="search-result-limits">
                <div class="search-result-border search-result-target"></div>
            </div>
        </div>
        <div class="item">
        </div>
    </div>
    <div class="bottom-bar">
        <div class="links">
            <select class="locales"></select>
            <a href="/" class="home">About</a>
        </div>
        <div class="last-updated"></div>
    </div>
</div>
<script src="main.js"></script>
</body>
</html>
