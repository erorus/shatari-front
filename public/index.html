<!DOCTYPE html>
<html>
<head>
    <title>Project Sha'tari</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="manifest" href="manifest.json">
    <script>
        const wowhead_tooltips = {hide: {extra: true, sellprice: true}};
    </script>
    <script src="https://wow.zamimg.com/widgets/power.js" async></script>
</head>
<body>
<div class="main">
    <div class="search-bar">
        <select>
            <option value="">Choose a realm:</option>
        </select>
        <div class="favorite"></div>
        <div class="text-container">
            <input type="text" placeholder="Search">
            <div class="text-reset"></div>
            <div class="datalist"></div>
        </div>
        <div class="filter">Filter<div>
            <span class="q">Level Range</span><br>
            <input type="number" name="level-min" maxlength="3" min="0" max="999">-<input type="number" name="level-max" maxlength="3" min="0" max="999"><br>
            <br>
            <label><input type="checkbox" name="transmog-mode"> Transmog Mode</label><br>
            <label><input type="checkbox" name="out-of-stock" CHECKED> Include Out-of-Stock</label><br>
            <label><input type="checkbox" name="never-seen"> Include Never Seen</label><br>
            <br>
            <span class="q">Rarity</span><br>
            <label><input type="checkbox" class="rarity" value="0" CHECKED><span class="q0"> Poor</span></label><br>
            <label><input type="checkbox" class="rarity" value="1" CHECKED><span class="q1"> Common</span></label><br>
            <label><input type="checkbox" class="rarity" value="2" CHECKED><span class="q2"> Uncommon</span></label><br>
            <label><input type="checkbox" class="rarity" value="3" CHECKED><span class="q3"> Rare</span></label><br>
            <label><input type="checkbox" class="rarity" value="4" CHECKED><span class="q4"> Epic</span></label><br>
            <label><input type="checkbox" class="rarity" value="5" CHECKED><span class="q5"> Legendary</span></label><br>
        </div></div>
        <button class="search">Search</button>
    </div>
    <div class="main-result">
        <div class="categories-parent">
            <div class="categories"></div>
        </div>
        <div class="search-result">
            <div class="welcome">
                <h1>Project Sha'tari (Alpha)</h1>
                Start your search for most auctionable items by selecting a realm in the top left.
            </div>
            <div class="search-result-border search-result-target"></div>
        </div>
        <div class="item">
        </div>
    </div>
    <!-- div class="bottom-bar">
        <div class="links"><a href="/">About</a></div>
    </div -->
</div>
<script src="main.js"></script>
</body>
</html>
