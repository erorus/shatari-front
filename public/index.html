<!DOCTYPE html>
<html>
<head>
    <title>Project Sha'tari</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="manifest" href="manifest.json">
    <script>
        const wowhead_tooltips = {hide: {extra: true}};
    </script>
    <script src="https://wow.zamimg.com/widgets/power.js" async></script>
</head>
<body>
<div class="main">
    <div class="search-bar">
        <select>
            <option value="">Choose a realm:</option>
        </select>
        <div class="favorite"></div>
        <div class="text-container">
            <input type="text" placeholder="Search">
            <div class="text-reset"></div>
            <div class="datalist"></div>
        </div>
        <div class="filter">Filter<div>
            <span class="q">Level Range</span><br>
            <input type="number" name="level-min" maxlength="3" min="0" max="999">-<input type="number" name="level-max" maxlength="3" min="0" max="999"><br>
            <br>
            <label><input type="checkbox" name="transmog-mode"> Transmog Mode</label><br>
            <label><input type="checkbox" name="vendor-flip"> Below Vendor Price</label><br>
            <label><input type="checkbox" name="out-of-stock" CHECKED> Include Out-of-Stock</label><br>
            <label><input type="checkbox" name="never-seen"> Include Never Seen</label><br>
            <br>
            <span class="q">Rarity</span><br>
            <table class="rarity">
                <tr><td>From</td>
                    <td><select class="rarity q0" name="rarity-from">
                    <option value="0" class="q0" SELECTED>Poor</option>
                    <option value="1" class="q1">Common</option>
                    <option value="2" class="q2">Uncommon</option>
                    <option value="3" class="q3">Rare</option>
                    <option value="4" class="q4">Epic</option>
                    <option value="5" class="q5">Legendary</option>
                </select></td></tr>
                <tr><td>To</td>
                    <td><select class="rarity q5" name="rarity-to">
                    <option value="0" class="q0">Poor</option>
                    <option value="1" class="q1">Common</option>
                    <option value="2" class="q2">Uncommon</option>
                    <option value="3" class="q3">Rare</option>
                    <option value="4" class="q4">Epic</option>
                    <option value="5" class="q5" SELECTED>Legendary</option>
                </select></td></tr>
            </table>
        </div></div>
        <button class="search">Search</button>
    </div>
    <div class="main-result">
        <div class="categories-parent">
            <div class="categories"></div>
        </div>
        <div class="search-result">
            <div class="welcome">
                <h1>Project Sha'tari (Alpha)</h1>
                Start your search for most auctionable items by selecting a realm in the top left.
            </div>
            <div class="search-result-border search-result-target"></div>
        </div>
        <div class="item">
        </div>
    </div>
    <!-- div class="bottom-bar">
        <div class="links"><a href="/">About</a></div>
    </div -->
</div>
<script src="main.js"></script>
</body>
</html>
