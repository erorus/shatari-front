<html>
<head>
    <link rel="stylesheet" href="css/main.css">
    <title>Shatari</title>
</head>
<body>
<div class="main">
    <div class="search-bar">
        <div class="title">Shatari Market</div>
        <div class="search-box"><input type="text"> <button>Search</button></div>
    </div>
    <div class="main-result">
        <div class="categories"></div>
        <div class="search-result">
            <div class="search-result-border">
                <table>
                <thead>
                    <tr>
                        <td>Price</td>
                        <td>Name</td>
                        <td>Available</td>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="price">
                            <span class="gold">123</span>
                            <span class="silver">45</span>
                        </td>
                        <td class="name">
                            <div class="icon"></div>
                            <div class="text">Some Item Name</div>
                        </td>
                        <td class="quantity">200</td>
                    </tr>
                    <tr>
                        <td class="price">
                            <span class="gold">1,234</span>
                            <span class="silver">5</span>
                        </td>
                        <td class="name">
                            <div class="icon"></div>
                            <div class="text">Some Other Item Name</div>
                        </td>
                        <td class="quantity">20</td>
                    </tr>
                    <tr>
                        <td class="price">
                            <span class="gold">23,456</span>
                            <span class="silver">0</span>
                        </td>
                        <td class="name">
                            <div class="icon"></div>
                            <div class="text">Some Expensive Item</div>
                        </td>
                        <td class="quantity">1</td>
                    </tr>
                    <tr>
                        <td class="price">
                            <span class="gold">9,999,999</span>
                            <span class="silver">0</span>
                        </td>
                        <td class="name">
                            <div class="icon"></div>
                            <div class="text">Some Other Expensive Item</div>
                        </td>
                        <td class="quantity">1</td>
                    </tr>
                </tbody>
            </table>
            </div>
        </div>
        <div class="item">
            <div class="name">
                <div class="icon"></div>
                <div class="text">Some Item Name</div>
            </div>
            <div class="auctions">
                <div class="row">
                    <div class="price">
                        <span class="gold">123</span>
                        <span class="silver">45</span>
                    </div>
                    <div class="quantity">200</div>
                </div>
                <div class="row">
                    <div class="price">
                        <span class="gold">888</span>
                        <span class="silver">0</span>
                    </div>
                    <div class="quantity">4</div>
                </div>
            </div>
            <div class="quantity-calc">
                more stuff
            </div>
        </div>
    </div>
    <div class="bottom-bar">
        <div class="links"><a href="/">About</a></div>
    </div>
</div>
<script src="main.js"></script>
</body>
</html>
