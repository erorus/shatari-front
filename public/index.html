<html>
<head>
    <link rel="stylesheet" href="main.css">
    <title>Shatari</title>
</head>
<body>
<div class="main">
    <div class="categories">
    </div>
    <div class="search-result">
        <div class="heading">
            <div class="price">Price</div>
            <div class="name">Name</div>
            <div class="quantity">Available</div>
        </div>
        <div class="row">
            <div class="price">
                <span class="gold">123</span>
                <span class="silver">45</span>
            </div>
            <div class="name">
                <div class="icon"></div>
                <div class="text">Some Item Name</div>
            </div>
            <div class="quantity">200</div>
        </div>
        <div class="row">
            <div class="price">
                <span class="gold">1,234</span>
                <span class="silver">5</span>
            </div>
            <div class="name">
                <div class="icon"></div>
                <div class="text">Some Other Item Name</div>
            </div>
            <div class="quantity">20</div>
        </div>
        <div class="row">
            <div class="price">
                <span class="gold">23,456</span>
                <span class="silver">0</span>
            </div>
            <div class="name">
                <div class="icon"></div>
                <div class="text">Some Expensive Item</div>
            </div>
            <div class="quantity">1</div>
        </div>
    </div>
    <div class="item">
        <div class="name">
            <div class="icon"></div>
            <div class="text">Some Item Name</div>
        </div>
        <div class="auctions">
            <div class="row">
                <div class="price">
                    <span class="gold">123</span>
                    <span class="silver">45</span>
                </div>
                <div class="quantity">200</div>
            </div>
            <div class="row">
                <div class="price">
                    <span class="gold">888</span>
                    <span class="silver">0</span>
                </div>
                <div class="quantity">4</div>
            </div>
        </div>
        <div class="quantity-calc">
            more stuff
        </div>
    </div>
</div>
<script src="main.js"></script>
</body>
</html>
