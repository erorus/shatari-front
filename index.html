<!DOCTYPE html>
<html>
<head>
    <title>Undermine Exchange</title>
    <!--
        For my mother.
    -->
    <link rel="stylesheet" href="/src/scss/main.scss">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" sizes="45x45" href="/images/favicon/native.png" type="image/png">
    <link rel="icon" href="/images/favicon/favicon.ico">
    <link rel="canonical" href="https://undermine.exchange/">
    <meta name="viewport" content="width=device-width">
    <script type="module" src="/src/ts/main.ts"></script>
    <meta http-equiv="Content-Security-Policy" content="base-uri 'none'; default-src 'none'; frame-src https://oribos.exchange; manifest-src https://undermine.exchange; font-src https://undermine.exchange https://wow.zamimg.com; style-src https://undermine.exchange https://wow.zamimg.com; style-src-attr 'unsafe-inline'; connect-src https://undermine.exchange https://*.wowhead.com; img-src https://undermine.exchange data: https://wow.zamimg.com; script-src https://undermine.exchange">
</head>
<body>
<div class="main">
    <div class="search-bar">
        <select>
            <option value="">Choose a realm:</option>
        </select>
        <a class="small-button favorite" data-default-tooltip="Mark items as favorites by clicking the star on their search result rows, and this button will search only those favorites."></a>
        <a class="small-button deals" data-simple-tooltip="Deals Search"></a>
        <div class="text-container">
            <input type="text" placeholder="Search">
            <div class="text-reset"></div>
            <div class="datalist"></div>
        </div>
        <a class="filter">Filter<div>
            <span class="q">Level Range</span><br>
            <input type="number" name="level-min" maxlength="3" min="0" max="999">-<input type="number" name="level-max" maxlength="3" min="0" max="999"><br>
            <br>
            <span class="q">Rarity</span><br>
            <table class="rarity">
                <tr><td>From</td>
                    <td><select class="rarity q0" name="rarity-from">
                    <option value="0" class="q0" SELECTED>Poor</option>
                    <option value="1" class="q1">Common</option>
                    <option value="2" class="q2">Uncommon</option>
                    <option value="3" class="q3">Rare</option>
                    <option value="4" class="q4">Epic</option>
                    <option value="5" class="q5">Legendary</option>
                </select></td></tr>
                <tr><td>To</td>
                <td><select class="rarity q5" name="rarity-to">
                    <option value="0" class="q0">Poor</option>
                    <option value="1" class="q1">Common</option>
                    <option value="2" class="q2">Uncommon</option>
                    <option value="3" class="q3">Rare</option>
                    <option value="4" class="q4">Epic</option>
                    <option value="5" class="q5" SELECTED>Legendary</option>
                </select></td></tr>
            </table>
            <br>
            <span class="q">Era</span><br>
            <select class="expansion" name="expansion">
                <option value="" SELECTED>All</option>
                <option value="12">Midnight</option>
                <option value="11">The War Within</option>
                <option value="10">Dragonflight</option>
                <option value="9">Shadowlands</option>
                <option value="8">Battle for Azeroth</option>
                <option value="7">Legion</option>
                <option value="6">Warlords of Draenor</option>
                <option value="5">Mists of Pandaria</option>
                <option value="4">Cataclysm</option>
                <option value="3">Wrath of the Lich King</option>
                <option value="2">The Burning Crusade</option>
                <option value="1">Vanilla</option>
            </select><br>
            <br>
            <label data-simple-tooltip="Mixes item levels, item suffixes, and battle pet breeds in search results."><input type="checkbox" name="transmog-mode"> Ignore Varieties</label><br>
            <label data-simple-tooltip="Only shows results which have posted prices under the vendor sell price." class="arbitrage-mode-ignored"><input type="checkbox" name="vendor-flip"> Only Below Vendor Price</label><br>
            <label data-simple-tooltip="Includes results which currently have no quantity available (but have previously been posted)." class="arbitrage-mode-ignored"><input type="checkbox" name="out-of-stock" CHECKED> Include Out-of-Stock</label><br>
            <br>
            <label data-simple-tooltip="Shows the Region Median price column in the search result list for non-commodities. The window must be wide enough for the extra column."><input type="checkbox" name="show-region-median"> Add Region Median Column</label><br>
            <label data-simple-tooltip="Search results show the lowest price across the current region, and the percentage of realms which have the item for sale. Current realm is irrelevant."><input type="checkbox" name="arbitrage-mode"> Arbitrage Mode</label><br>
        </div></a>
        <div class="button-border"><button class="search">Search</button></div>
    </div>
    <div class="main-result">
        <div class="categories-parent">
            <div class="categories"></div>
        </div>
        <div class="search-result">
            <div class="welcome">
                <h1>Undermine Exchange</h1>
                <div class="maintenance" style="display: none">
                    Undermine Exchange is currently under maintenance. Please return later.
                </div>
                <div>
                    An augmented Auction House interface, used by the goblins of Undermine.
                </div>

                <div class="full-screen" style="display: none"><button>Use Full Screen</button></div>

                <div>
                    <span id="contact-link"></span>
                    <br>
                    Created by Erorus for players of <a href="https://worldofwarcraft.blizzard.com/">World of Warcraft: Midnight</a>.
                </div>
            </div>

            <div class="search-result-limits">
                <div class="search-result-border search-result-target"></div>
            </div>
        </div>
        <div class="item">
        </div>
    </div>
    <div class="bottom-bar">
        <div class="links">
            <select class="locales"></select>
            <a href="/" class="home">About</a>
        </div>
        <div class="progress">
            <div class="progress-spinner">
                <div class="progress-spinner-inner"></div>
            </div>
            <div class="progress-bar">
                <div class="progress-bar-value"></div>
            </div>
        </div>
        <div class="last-updated"></div>
        <div class="account" style="display: none">
            <form method="POST" action="/account/login" class="login logged-out-only">
                <button type="submit" data-simple-tooltip="Patrons, please sign in to unlock all site features.">Sign In with Patreon</button>
            </form>
            <form method="POST" action="/account/logout" class="logout logged-in-only">
                <a href="https://www.patreon.com/erorus" class="free-only" data-simple-tooltip="Become a paid member at the Goblin tier or above to unlock all site features!">Become a Patron</a>
                <span class="paid-only" data-simple-tooltip="You're signed in to your paid membership, and all features are unlocked. Thank you!">Patron</span>
                <button type="submit">Sign Out</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
